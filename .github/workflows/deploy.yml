name: AWS Network Orchestrator Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout repository
      # ----------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Install Terraform
      # ----------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # ----------------------------
      # 3. Install jq (for JSON parsing)
      # ----------------------------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ----------------------------
      # 4. Read request.json dynamically
      # ----------------------------
      - name: Parse Request File
        run: |
          echo "ACCOUNT_ID=$(jq -r .account_id requests/request.json)" >> $GITHUB_ENV
          echo "ACCOUNT_NAME=$(jq -r .account_name requests/request.json)" >> $GITHUB_ENV
          echo "REGION=$(jq -r .region requests/request.json)" >> $GITHUB_ENV
          echo "VPC_CIDR=$(jq -r .vpc_cidr requests/request.json)" >> $GITHUB_ENV
          echo "VPC_REQ=$(jq -r .vpc_required requests/request.json)" >> $GITHUB_ENV
          echo "ENVIRONMENT=$(jq -r .environment requests/request.json)" >> $GITHUB_ENV
          echo "REQUEST_ID=$(jq -r .request_id requests/request.json)" >> $GITHUB_ENV

      # ----------------------------
      # 5. Terraform Init
      # ----------------------------
      - name: Terraform Init
        working-directory: env
        run: terraform init

      # ----------------------------
      # 6. Terraform Validate
      # ----------------------------
      - name: Terraform Validate
        working-directory: env
        run: terraform validate

      # ----------------------------
      # 7. Terraform Plan
      # ----------------------------
      - name: Terraform Plan
        working-directory: env
        run: |
          terraform plan \
            -var="aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -var="aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -var="region=${REGION}" \
            -var="account_id=${ACCOUNT_ID}" \
            -var="account_name=${ACCOUNT_NAME}" \
            -var="vpc_cidr=${VPC_CIDR}" \
            -var="vpc_required=${VPC_REQ}" \
            -var="environment=${ENVIRONMENT}" \
            -var="request_id=${REQUEST_ID}"

      # ----------------------------
      # 8. Terraform Apply
      # ----------------------------
      - name: Terraform Apply
        working-directory: env
        run: |
          terraform apply -auto-approve \
            -var="aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -var="aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -var="region=${REGION}" \
            -var="account_id=${ACCOUNT_ID}" \
            -var="account_name=${ACCOUNT_NAME}" \
            -var="vpc_cidr=${VPC_CIDR}" \
            -var="vpc_required=${VPC_REQ}" \
            -var="environment=${ENVIRONMENT}" \
            -var="request_id=${REQUEST_ID}"
